<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSV Chart Viewer</title>
    <link rel="stylesheet" href="uPlot.min.css">
    <link rel="stylesheet" href="flatpickr.min.css">
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: #f5f5f5; }
        #toolbar { background: #2c3e50; color: white; padding: 10px 15px; display: flex; align-items: center; gap: 15px; z-index: 10; flex-shrink: 0; }
        .tool-group { display: flex; align-items: center; gap: 8px; border-right: 1px solid #555; padding-right: 15px; }
        button { padding: 6px 12px; cursor: pointer; border: none; border-radius: 4px; background: #34495e; color: white; font-weight: bold; font-size: 13px; }
        #loadBtn { background: #27ae60; }
        #applyBtn { background: #2980b9; }
        #exportBtn { background: #2980b9; }
        #snapBtn { background: #2980b9; }
        /* Diff 버튼 스타일 추가 */
        #diffModeBtn { background: #e67e22; } 
        
        input, select { padding: 5px; border-radius: 4px; border: 1px solid #ccc; font-size: 13px; }
        #main { display: flex; flex: 1; overflow: hidden; }
        
        /* 1. 왼쪽 데이터 선택창: HD 해상도 기준 250px 고정 */
        #sidebar { width: 250px; min-width: 250px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; padding: 10px; flex-shrink: 0; }
        
        .sidebar-header { margin-bottom: 10px; display: flex; gap: 5px; justify-content: center; }
        #legend-container { flex: 1; overflow-y: auto; font-size: 12px; border: 1px solid #eee; }
        .col-item { margin-bottom: 3px; display: flex; align-items: center; gap: 6px; padding: 2px; }
        
        /* 2. 차트 영역: 창 크기에 따라 동적으로 변화 */
        #content { flex: 1; display: flex; flex-direction: column; background: white; min-width: 0; }
        #chart-area { flex: 1; position: relative; width: 100%; height: 100%; }
        
        /* 3. 하단 Marked value: 120px 고정 */
        #pinned-data { height: 120px; min-height: 120px; background: #f9f9f9; border-top: 2px solid #34495e; padding: 10px 15px; font-size: 12px; color: #2c3e50; font-family: monospace; overflow: auto; flex-shrink: 0; }
        
        .u-tooltip { position: absolute; background: rgba(0,0,0,0.8); color: white; padding: 5px; border-radius: 3px; font-size: 11px; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>
    <div id="toolbar">
        <div class="tool-group">
            <button id="loadBtn">Open CSV</button>
            <span id="status" style="font-size: 12px;">Ready</span>
        </div>
        <div class="tool-group">
            <input type="text" id="startDate" placeholder="Start Date" style="width: 135px;">
            <span>~</span>
            <input type="text" id="endDate" placeholder="End Date" style="width: 135px;">
            <button id="applyBtn">Apply</button>
        </div>
        <div class="tool-group">
            <select id="rangeSelect">
                <option value="">Quick Range</option>
                <option value="1h">Last 1 Hour</option>
                <option value="1d">Last 1 Day</option>
                <option value="1w">Last 1 Week</option>
                <option value="1m">Last 1 Month</option>
                <option value="1y">Last 1 Year</option>
            </select>
        </div>
        <div class="tool-group">
            <button id="zoomModeBtn">Zoom</button>
            <button id="panModeBtn">Pan</button>
            <button id="diffModeBtn">Diff</button>
            <button id="dualYBtn">Dual Y: Off</button>
            <button id="scaleBtn">Scale: Linear</button>
            <button id="exportBtn">Export CSV</button>
            <button id="snapBtn">Screenshot</button>
        </div>
    </div>
    <div id="main">
        <div id="sidebar">
            <div class="sidebar-header">
                <button id="allBtn" style="padding: 3px 8px; font-size: 11px;">Select All</button>
                <button id="noneBtn" style="padding: 3px 8px; font-size: 11px; background: #7f8c8d;">Unselect All</button>
            </div>
            <div id="legend-container"></div>
        </div>
        <div id="content">
            <div id="chart-area"></div>
            <div id="pinned-data">
                <i>Click on chart to pin marked values or use Diff mode...</i>
            </div>
        </div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
